<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroFIT - AI-Powered Fitness Analysis</title>
    <meta
      name="description"
      content="Get your fitness score out of 100. AI-powered analysis, evidence-based workout, nutrition and recovery plans tailored to you."
    />
    <meta name="theme-color" content="#f7f9fc" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const isGitHubPages = location.hostname.endsWith("github.io");

      if (isGitHubPages) {
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "/NeuroFIT-/assets/styles.css";
        document.head.append(stylesheet);

        const pagesEntry = "/NeuroFIT-/assets/pages-main.js";
        await import(/* @vite-ignore */ pagesEntry);
      } else {
        await import("/src/pages-main.tsx");
      }
    </script>
  </body>
</html>
